services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: despacho_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: appuser123
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uappuser", "-pappuser123"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
    restart: always
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: despacho_db
      DB_USERNAME: appuser
      DB_PASSWORD: appuser123
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend-despacho:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    restart: always
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: despacho_db
      DB_USERNAME: appuser
      DB_PASSWORD: appuser123
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./front_despacho
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend-ventas
      - backend-despacho
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql_data: